version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripenforce
      POSTGRES_PASSWORD: tripenforce
      POSTGRES_DB: tripenforce
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripenforce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
